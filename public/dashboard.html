<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Leads Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-gray-900 p-4 shadow mt-0 w-full">
        <div class="container mx-auto flex flex-wrap items-center justify-between">
            <div class="flex text-white font-extrabold">
                <span class="text-xl pl-2">System Architect Dashboard</span>
            </div>
            <div class="flex">
                <button id="logoutBtn" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 px-4">
        <div class="bg-white shadow-md rounded my-6">
            <table class="text-left w-full border-collapse">
                <thead>
                    <tr>
                        <th class="py-4 px-6 bg-gray-100 font-bold uppercase text-sm text-gray-600 border-b border-gray-200">Date</th>
                        <th class="py-4 px-6 bg-gray-100 font-bold uppercase text-sm text-gray-600 border-b border-gray-200">Name</th>
                        <th class="py-4 px-6 bg-gray-100 font-bold uppercase text-sm text-gray-600 border-b border-gray-200">Email</th>
                        <th class="py-4 px-6 bg-gray-100 font-bold uppercase text-sm text-gray-600 border-b border-gray-200">Message</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                    <tr><td colspan="4" class="text-center py-4">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
